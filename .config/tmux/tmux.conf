# Tmux Config

# Better prefix for the leader
# C-b is the default

unbind C-b
set -g prefix `
bind ` send-prefix

# Change base pane number to from 0 to 1
set -g base-index 1
set -g pane-base-index 1

set -g renumber-windows on

# Keybindings for split
# leader+v for a vertical split
# leader+h for a horizontal split
# use leader+arrows for moving between splits

bind v split-window -v
bind h split-window -h

set -g mouse on

# # =Look and feel=

# True color support
set -g default-terminal "${TERM}"
set -sg terminal-overrides ",*:RGB"

# ===== Status Bar =====

# Use terminal colors (neutral)
set -g status-style default

set -g status-interval 5
set -g status-keys vi

set -g status-left-length 40
set -g status-left "#[fg=cyan,bold]#S #[default]"
set -g status-left-style default
set -g status-position bottom
set -g status-right "#[fg=cyan]#H #[fg=green,bg=default,bright]#(tmux-mem-cpu-load) #[fg=white,bg=default]%a%l:%M:%S %p %Z#[default] #[fg=blue]%Y-%m-%d"
set -g status-right-length 140
set -g status-right-style default
set -g status-style fg=colour136,bg=colour235

# Window list
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=yellow,bold] #I:#W #[default]"

# Window status styles
set -g window-status-separator ""

# Activity / bell
set -g window-status-activity-style fg=red,bold

# Pane border (subtle)
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=cyan
